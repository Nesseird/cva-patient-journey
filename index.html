<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVA Journey App</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:20px;
    font-size:20px;
    background:#f6f8fb;
    color:#1b1f23;
}

h1{
    font-size:28px;
}

h2{
    margin-top:10px;
}

.intro{
    background:#e8f1ff;
    padding:16px;
    border-radius:12px;
    margin-bottom:20px;
    line-height:1.5;
}

.dashboard{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:12px;
}

.week-card{
    background:white;
    border:2px solid #d0d7de;
    border-radius:12px;
    padding:14px;
    cursor:pointer;
    transition:0.2s;
}

.week-card:hover{
    transform:translateY(-2px);
}

.progress-bar{
    height:10px;
    background:#e1e4e8;
    border-radius:6px;
    overflow:hidden;
    margin-top:8px;
}

.progress-fill{
    height:100%;
    background:#2ea44f;
    width:0%;
}

button{
    padding:10px 14px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#0969da;
    color:white;
    cursor:pointer;
    margin:5px 5px 10px 0;
}

button:hover{
    background:#0550ae;
}

.day{
    background:white;
    border-radius:12px;
    padding:12px;
    margin-bottom:12px;
    border:2px solid #d0d7de;
}

.task{
    background:#f2f6fb;
    padding:10px;
    margin:8px 0;
    border-radius:10px;
    cursor:pointer;
}

.task.done{
    background:#b7e4c7;
}

.rating span{
    font-size:22px;
    margin-left:8px;
    cursor:pointer;
    opacity:0.4;
}

.rating span.active{
    opacity:1;
}

.small{
    font-size:16px;
    color:#57606a;
}

.hidden{
    display:none;
}

#topbar{
    margin-bottom:10px;
}
</style>
</head>

<body>

<h1>🧠 CVA Journey App</h1>

<div class="intro">
Deze app helpt je stap voor stap herstellen na een CVA.<br>
Je werkt dagelijks aan oefeningen om zelfstandigheid, conditie en ADL-functie te verbeteren.
</div>

<div id="dashboard"></div>

<div id="view" class="hidden">

<div id="topbar">
<button onclick="backToDashboard()">← Dashboard</button>
</div>

<h2 id="weekTitle"></h2>
<p id="weekGoal" class="small"></p>

<p id="progress"></p>
<p id="streak"></p>

<div id="days"></div>

</div>

<script>
const weeks = [
{
title:"Week 1-2 Mobilisatie",
goal:"Veilig mobiliseren en ADL hervatten.",
tasks:["Mobiliseren","Zitten/staan","ADL"]
},
{
title:"Week 3 Opbouw",
goal:"Lichte kracht en balans opbouwen.",
tasks:["Kracht licht","Balans basis","Herhaling"]
},
{
title:"Week 4 Opbouw",
goal:"Controle en stabiliteit verbeteren.",
tasks:["Kracht","Balans","Controle"]
},
{
title:"Week 5-6 Functioneel",
goal:"Lopen en transfers verbeteren.",
tasks:["Traplopen","Lopen","Transfers"]
},
{
title:"Week 7 Functioneel+",
goal:"Complexere motorische taken uitvoeren.",
tasks:["Snelheid","Dubbele taken","Coördinatie"]
},
{
title:"Week 8-9 Uithouding",
goal:"Condities opbouwen in dagelijks functioneren.",
tasks:["Wandelen","Fietsen","Duurbelasting"]
},
{
title:"Week 10 Uithouding+",
goal:"Belastbaarheid verder vergroten.",
tasks:["Interval","Tempo","Activiteit"]
},
{
title:"Week 11 Participatie",
goal:"Terugkeer naar werk en sociale rollen.",
tasks:["Werk","Sociaal","Zelfstandigheid"]
},
{
title:"Week 12 Borging",
goal:"Zelfmanagement en onderhoud van niveau.",
tasks:["Routine","Zelfmanagement","Evaluatie"]
}
];

let state = JSON.parse(localStorage.getItem("state")||"{}");
let ratings = JSON.parse(localStorage.getItem("ratings")||"{}");
let streak = parseInt(localStorage.getItem("streak")||"0");
let completedDays = new Set(JSON.parse(localStorage.getItem("completedDays")||"[]"));

let currentWeek = null;

function save(){
localStorage.setItem("state",JSON.stringify(state));
localStorage.setItem("ratings",JSON.stringify(ratings));
localStorage.setItem("streak",streak);
localStorage.setItem("completedDays",JSON.stringify([...completedDays]));
}

function renderDashboard(){
let d = document.getElementById("dashboard");
d.innerHTML="";

weeks.forEach((w,i)=>{
let total=0,done=0;

for(let day=0;day<7;day++){
for(let t=0;t<w.tasks.length;t++){
let k=i+"-"+day+"-"+t;
total++;
if(state[k]) done++;
}
}

let perc = total?Math.round(done/total*100):0;

let el = document.createElement("div");
el.className="week-card";
el.innerHTML=`
<b>${w.title}</b>
<div class="small">${perc}% voltooid</div>
<div class="progress-bar"><div class="progress-fill" style="width:${perc}%"></div></div>
`;

el.onclick=()=>openWeek(i);

d.appendChild(el);
});
}

function openWeek(i){
currentWeek=i;
document.getElementById("dashboard").classList.add("hidden");
document.getElementById("view").classList.remove("hidden");

document.getElementById("weekTitle").innerText=weeks[i].title;
document.getElementById("weekGoal").innerText=weeks[i].goal;

renderWeek();
}

function backToDashboard(){
document.getElementById("view").classList.add("hidden");
document.getElementById("dashboard").classList.remove("hidden");
renderDashboard();
save();
}

function renderWeek(){
let d=document.getElementById("days");
d.innerHTML="";

let w=weeks[currentWeek];

for(let i=0;i<7;i++){
let day=document.createElement("div");
day.className="day";

let title=document.createElement("b");
title.innerText="Dag "+(i+1);
day.appendChild(title);

let allDone=true;

w.tasks.forEach((t,j)=>{
let k=currentWeek+"-"+i+"-"+j;

let task=document.createElement("div");
task.className="task "+(state[k]?"done":"");

task.innerHTML=t;

if(!state[k]) allDone=false;

task.onclick=()=>{
state[k]=!state[k];
checkStreak(i);
renderWeek();
renderDashboard();
};

let rating=document.createElement("div");
rating.className="rating";

["🙂","😐","😓"].forEach((e,idx)=>{
let s=document.createElement("span");
s.innerText=e;

if(ratings[k]==idx+1) s.classList.add("active");

s.onclick=(ev)=>{
ev.stopPropagation();
ratings[k]=idx+1;
renderWeek();
};

rating.appendChild(s);
});

task.appendChild(rating);
day.appendChild(task);
});

if(allDone && w.tasks.length>0){
day.style.borderColor="#2ea44f";
}

d.appendChild(day);
}
updateStats();
}

function checkStreak(day){
let key=currentWeek+"-"+day;

let done = weeks[currentWeek].tasks.every((_,j)=>{
return state[currentWeek+"-"+day+"-"+j];
});

if(done && !completedDays.has(key)){
streak++;
completedDays.add(key);
save();
}
}

function updateStats(){
let total=0,done=0;

for(let k in state){
total++;
if(state[k]) done++;
}

let perc=total?Math.round(done/total*100):0;

document.getElementById("progress").innerText="Totale progressie: "+perc+"%";
document.getElementById("streak").innerText="🔥 Streak: "+streak+" dagen";
}

renderDashboard();
</script>

</body>
</html>
