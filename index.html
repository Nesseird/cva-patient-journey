<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>CVA Revalidatie Kalender</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: system-ui, sans-serif;
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    background: #f5f5f5;
}

/* HEADER */
h1 { text-align: center; margin-bottom: 10px; }
.subtitle { text-align: center; margin-bottom: 20px; }

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

button {
    padding: 10px 15px;
    border: none;
    background: #4299e1;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* WEEK */
.week-header {
    background: #4299e1;
    color: white;
    padding: 12px;
    text-align: center;
    border-radius: 8px;
    margin-bottom: 10px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day-header {
    text-align: center;
    font-weight: bold;
}

/* DAY */
.day {
    background: white;
    border-radius: 8px;
    padding: 10px;
    min-height: 130px;
    cursor: pointer;
}

.day-number {
    font-weight: bold;
    margin-bottom: 5px;
}

/* TASK */
.task {
    font-size: 0.9em;
    margin: 5px 0;
    cursor: pointer;
}

.task.complete {
    text-decoration: line-through;
    opacity: 0.6;
}

/* PROGRESS */
.progress {
    text-align: center;
    margin: 15px 0;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🧠 CVA Revalidatie Kalender</h1>
<div class="subtitle" id="phase"></div>

<div class="nav">
    <button onclick="prevWeek()">⬅ Vorige</button>
    <button onclick="nextWeek()">Volgende ➡</button>
</div>

<div class="week-header" id="weekTitle"></div>

<div class="grid" id="headers"></div>
<div class="grid" id="calendar"></div>

<div class="progress" id="progress"></div>

<script>
const days = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

const weeks = [
{
    title: "Week 1",
    phase: "Intake → Krachtoefeningen starten (3x/dag)",
    tasks: [
        ["Krachtoefeningen", "Stappen 3000"],
        ["Krachtoefeningen"],
        ["Krachtoefeningen"],
        ["Krachtoefeningen"],
        ["Krachtoefeningen"],
        ["Rust"],
        ["Rust"]
    ]
},
{
    title: "Week 4",
    phase: "Poli-check → Traplopen oefenen (80%)",
    tasks: [
        ["Traplopen"],
        ["Traplopen"],
        ["Traplopen"],
        ["Traplopen"],
        ["Traplopen"],
        ["Rust"],
        ["Rust"]
    ]
},
{
    title: "Week 8",
    phase: "Thuisfase → Wandelen 10min + familie betrekken",
    tasks: [
        ["Wandelen 10 min"],
        ["Wandelen 10 min"],
        ["Wandelen 10 min"],
        ["Wandelen 10 min"],
        ["Wandelen 10 min"],
        ["Familie activiteit"],
        ["Rust"]
    ]
},
{
    title: "Week 12",
    phase: "Afsluiting → Terug naar werk checklist",
    tasks: [
        ["Werk checklist"],
        ["Werk checklist"],
        ["Werk checklist"],
        ["Werk checklist"],
        ["Werk checklist"],
        ["Evaluatie"],
        ["Rust"]
    ]
}
];

let currentWeek = 0;
let state = {};

function render() {
    document.getElementById("weekTitle").innerText = weeks[currentWeek].title;
    document.getElementById("phase").innerText = weeks[currentWeek].phase;

    const headerDiv = document.getElementById("headers");
    const calDiv = document.getElementById("calendar");

    headerDiv.innerHTML = "";
    calDiv.innerHTML = "";

    days.forEach(d => {
        const el = document.createElement("div");
        el.className = "day-header";
        el.innerText = d;
        headerDiv.appendChild(el);
    });

    weeks[currentWeek].tasks.forEach((dayTasks, i) => {
        const day = document.createElement("div");
        day.className = "day";

        let html = `<div class="day-number">${i+1}</div>`;

        dayTasks.forEach((task, tIndex) => {
            const key = currentWeek + "-" + i + "-" + tIndex;
            const done = state[key];

            html += `<div class="task ${done ? "complete":""}" 
                onclick="toggleTask(event,'${key}')">${task}</div>`;
        });

        day.innerHTML = html;
        calDiv.appendChild(day);
    });

    updateProgress();
}

function toggleTask(e, key) {
    e.stopPropagation();
    state[key] = !state[key];
    render();
}

function updateProgress() {
    const week = weeks[currentWeek];
    let total = 0, done = 0;

    week.tasks.forEach((d,i)=>{
        d.forEach((t,j)=>{
            total++;
            if(state[currentWeek+"-"+i+"-"+j]) done++;
        });
    });

    const perc = total ? Math.round((done/total)*100) : 0;
    document.getElementById("progress").innerText = "Progress: " + perc + "%";
}

function nextWeek() {
    if(currentWeek < weeks.length -1){
        currentWeek++;
        render();
    }
}

function prevWeek() {
    if(currentWeek > 0){
        currentWeek--;
        render();
    }
}

render();
</script>

</body>
</html>
