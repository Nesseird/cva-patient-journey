<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>CVA Revalidatie Kalender</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: system-ui;
    padding: 20px;
    background: #f0f4f8;
}

/* HEADER */
h1 {
    text-align: center;
    font-size: 2.5rem;
}

.subtitle {
    text-align: center;
    margin-bottom: 20px;
    font-size: 1.2rem;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    margin: 20px 0;
}

button {
    padding: 12px 20px;
    font-size: 1rem;
    background: #4299e1;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 12px;
}

.day-header {
    text-align: center;
    font-weight: bold;
    font-size: 1.1rem;
}

/* DAY */
.day {
    background: white;
    border-radius: 10px;
    padding: 12px;
    min-height: 150px;
    transition: 0.3s;
}

.day.complete {
    background: #d4edda;
}

/* TASK */
.task {
    font-size: 1rem;
    margin: 6px 0;
    padding: 6px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

.task.complete {
    background: #c6f6d5;
    text-decoration: line-through;
}

/* PROGRESS */
.progress {
    text-align: center;
    margin: 15px;
    font-size: 1.2rem;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🧠 CVA Revalidatie Kalender</h1>
<div class="subtitle" id="phase"></div>

<div class="nav">
<button onclick="prevWeek()">⬅</button>
<button onclick="nextWeek()">➡</button>
</div>

<div class="grid" id="headers"></div>
<div class="grid" id="calendar"></div>

<div class="progress" id="progress"></div>

<script>
const days = ["Ma","Di","Wo","Do","Vr","Za","Zo"];

const baseTasks = {
    early: ["Mobiliseren", "Zitten/staan oefenen", "ADL training"],
    strength: ["Krachttraining (3x/dag)", "Balans", "Herhalen beweging"],
    functional: ["Traplopen", "Lopen oefenen", "Transfer training"],
    endurance: ["Wandelen 10-20 min", "Fietsen licht", "Dagelijkse activiteit"],
    participation: ["Werk taken", "Zelfstandig plannen", "Sociale activiteit"]
};

const weeks = [
{phase:"Week 1-2: Mobilisatie", type:"early"},
{phase:"Week 3-4: Kracht", type:"strength"},
{phase:"Week 5-7: Functioneel", type:"functional"},
{phase:"Week 8-10: Uithoudingsvermogen", type:"endurance"},
{phase:"Week 11-12: Participatie", type:"participation"}
];

let currentWeek = 0;
let state = {};

function render() {
    document.getElementById("phase").innerText = weeks[currentWeek].phase;

    const header = document.getElementById("headers");
    const cal = document.getElementById("calendar");

    header.innerHTML = "";
    cal.innerHTML = "";

    days.forEach(d=>{
        const el = document.createElement("div");
        el.className="day-header";
        el.innerText=d;
        header.appendChild(el);
    });

    for(let i=0;i<7;i++){
        const day = document.createElement("div");
        day.className="day";

        let html = `<b>Dag ${i+1}</b>`;

        baseTasks[weeks[currentWeek].type].forEach((t,j)=>{
            const key = currentWeek+"-"+i+"-"+j;
            const done = state[key];

            html += `<div class="task ${done?"complete":""}" 
            onclick="toggleTask(event,'${key}')">${t}</div>`;
        });

        day.innerHTML = html;
        cal.appendChild(day);
    }

    updateProgress();
}

function toggleTask(e,key){
    e.stopPropagation();
    state[key]=!state[key];
    render();
}

function updateProgress(){
    let total=0, done=0;

    Object.keys(state).forEach(k=>{
        total++;
        if(state[k]) done++;
    });

    const perc = total?Math.round(done/total*100):0;
    document.getElementById("progress").innerText="Progress: "+perc+"%";
}

function nextWeek(){
    if(currentWeek<weeks.length-1){currentWeek++;render();}
}

function prevWeek(){
    if(currentWeek>0){currentWeek--;render();}
}

render();
</script>

</body>
</html>
