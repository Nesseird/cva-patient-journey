<!DOCTYPE html>
<html>
<head>
    <title>CVA Journey Calendar</title>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            max-width: 900px; margin: 0 auto; padding: 20px; background: #f5f5f5; 
            line-height: 1.6; color: #333; 
        }
        h1 { 
            color: #1a365d; text-align: center; margin-bottom: 30px; 
            font-size: 2.2em; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .week-container { margin: 30px 0; }
        .week-grid { 
            display: grid; 
            grid-template-columns: 120px repeat(7, 1fr); 
            gap: 5px 10px; 
            margin-bottom: 20px;
            max-width: 100%; 
        }
