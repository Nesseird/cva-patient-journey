<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>CVA Journey App</title>

<style>
body {
    font-family: system-ui;
    margin: 0;
    padding: 20px;
    background: #eef2f7;
}

/* INTRO */
.intro {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    margin: 15px 0;
}

button {
    padding: 10px 15px;
    border: none;
    background: #3182ce;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
}

.day {
    background: white;
    padding: 10px;
    border-radius: 8px;
    min-height: 140px;
}

.day.complete {
    background: #d4edda;
}

/* TASK */
.task {
    padding: 6px;
    margin: 5px 0;
    border-radius: 6px;
    cursor: pointer;
}

.task.complete {
    background: #c6f6d5;
}

/* REFLECTION */
.rating {
    font-size: 0.8rem;
}

/* STREAK */
.streak {
    text-align: center;
    font-weight: bold;
    margin: 10px;
}

/* PROGRESS */
.progress {
    text-align: center;
    margin: 10px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="intro">
    <h2>🧠 CVA Journey App</h2>
    <p>
        Deze app helpt je stap voor stap herstellen na een CVA. 
        Je werkt dagelijks aan oefeningen die je helpen weer zelfstandig te worden 
        in het dagelijks leven (ADL).
    </p>
    <p><b>Doel:</b> herstel, zelfstandigheid en voorkomen van nieuwe klachten.</p>
</div>

<div class="streak" id="streak"></div>

<div class="nav">
<button onclick="prevWeek()">⬅</button>
<button onclick="nextWeek()">➡</button>
</div>

<h3 id="phase"></h3>

<div class="grid" id="calendar"></div>

<div class="progress" id="progress"></div>

<script>
const weeks = [
{phase:"Week 1-2: Mobilisatie", tasks:["Mobiliseren","Zitten/staan","ADL"]},
{phase:"Week 3-4: Kracht", tasks:["Kracht","Balans","Herhaling"]},
{phase:"Week 5-7: Functioneel", tasks:["Traplopen","Lopen","Transfers"]},
{phase:"Week 8-10: Uithoudingsvermogen", tasks:["Wandelen","Fietsen","Activiteit"]},
{phase:"Week 11-12: Participatie", tasks:["Werk","Planning","Sociaal"]}
];

let currentWeek = 0;
let state = {};
let ratings = {};
let streak = 0;

function render() {
    document.getElementById("phase").innerText = weeks[currentWeek].phase;

    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let i=0;i<7;i++){
        const day = document.createElement("div");
        day.className = "day";

        let html = `<b>Dag ${i+1}</b>`;

        weeks[currentWeek].tasks.forEach((t,j)=>{
            const key = currentWeek+"-"+i+"-"+j;
            const done = state[key];

            html += `
            <div class="task ${done?"complete":""}" 
            onclick="toggleTask('${key}')">
                ${t}
                <div class="rating">
                    Moeite: 
                    <select onchange="rate(event,'${key}')">
                        <option value="">-</option>
                        <option value="1">🙂</option>
                        <option value="2">😐</option>
                        <option value="3">😓</option>
                    </select>
                </div>
            </div>`;
        });

        day.innerHTML = html;
        cal.appendChild(day);
    }

    updateProgress();
    document.getElementById("streak").innerText = "🔥 Streak: " + streak + " dagen";
}

function toggleTask(key){
    state[key] = !state[key];
    updateStreak();
    render();
}

function rate(e,key){
    ratings[key] = e.target.value;
}

function updateProgress(){
    let total=0, done=0;

    Object.keys(state).forEach(k=>{
        total++;
        if(state[k]) done++;
    });

    const perc = total?Math.round(done/total*100):0;
    document.getElementById("progress").innerText="Progress: "+perc+"%";
}

function updateStreak(){
    streak++;
}

function nextWeek(){
    if(currentWeek < weeks.length-1){
        currentWeek++;
        render();
    }
}

function prevWeek(){
    if(currentWeek > 0){
        currentWeek--;
        render();
    }
}

render();
</script>

</body>
</html>
