<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVA Revalidatie Planner</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    font-size: 18px;
}

h1 {
    margin-bottom: 10px;
}

#calendar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
}

.day {
    border: 2px solid #ccc;
    padding: 15px;
    border-radius: 10px;
}

.day.complete {
    background-color: #d4edda;
}

.task {
    padding: 8px;
    margin: 6px 0;
    border-radius: 6px;
    cursor: pointer;
    background-color: #f1f1f1;
}

.task.complete {
    background-color: #a5d6a7;
}

.rating span {
    margin-left: 6px;
    cursor: pointer;
    font-size: 20px;
}

.rating span.selected {
    font-weight: bold;
}

.controls {
    margin: 15px 0;
}

button {
    padding: 10px 15px;
    font-size: 16px;
    margin-right: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1 id="phase"></h1>

<div class="controls">
    <button onclick="prevWeek()">← Vorige</button>
    <button onclick="nextWeek()">Volgende →</button>
</div>

<p id="progress"></p>
<p id="streak"></p>

<div id="calendar"></div>

<script>
const weeks = [
{phase:"Week 1-2: Mobilisatie", tasks:["Mobiliseren","Zitten/staan","ADL"]},
{phase:"Week 3: Opbouw", tasks:["Kracht licht","Balans basis","Herhaling"]},
{phase:"Week 4: Opbouw", tasks:["Kracht","Balans","Controle"]},
{phase:"Week 5-6: Functioneel", tasks:["Traplopen","Lopen","Transfers"]},
{phase:"Week 7: Functioneel+", tasks:["Snelheid","Dubbele taken","Coördinatie"]},
{phase:"Week 8-9: Uithoudingsvermogen", tasks:["Wandelen","Fietsen","Duurbelasting"]},
{phase:"Week 10: Uithouding+", tasks:["Interval","Tempo","Activiteit"]},
{phase:"Week 11: Participatie", tasks:["Werk","Sociaal","Zelfstandigheid"]},
{phase:"Week 12: Borging", tasks:["Routine","Zelfmanagement","Evaluatie"]}
];

let currentWeek = 0;
let state = {};
let ratings = {};
let streak = 0;
let completedDays = new Set();

function render() {
    const phaseEl = document.getElementById("phase");
    const cal = document.getElementById("calendar");

    phaseEl.innerText = weeks[currentWeek].phase;
    cal.innerHTML = "";

    for(let i=0;i<7;i++){
        const dayKey = currentWeek+"-"+i;
        const day = document.createElement("div");
        day.className = "day";

        let allDone = true;

        const title = document.createElement("b");
        title.innerText = "Dag " + (i+1);
        day.appendChild(title);

        weeks[currentWeek].tasks.forEach((t,j)=>{
            const key = currentWeek+"-"+i+"-"+j;
            const done = state[key];

            if(!done) allDone = false;

            const task = document.createElement("div");
            task.className = "task " + (done ? "complete" : "");
            task.innerText = t;

            task.onclick = () => {
                state[key] = !state[key];
                checkDayCompletion(i);
                render();
            };

            const ratingDiv = document.createElement("div");
            ratingDiv.className = "rating";
            ratingDiv.innerText = "Moeite:";

            ["🙂","😐","😓"].forEach((emoji,idx)=>{
                const span = document.createElement("span");
                span.innerText = emoji;

                if(ratings[key] === idx+1){
                    span.classList.add("selected");
                } else {
                    span.style.opacity = "0.4";
                }

                span.onclick = (e) => {
                    e.stopPropagation();
                    ratings[key] = idx+1;
                    render();
                };

                ratingDiv.appendChild(span);
            });

            task.appendChild(ratingDiv);
            day.appendChild(task);
        });

        if(allDone && weeks[currentWeek].tasks.length > 0){
            day.classList.add("complete");
        }

        cal.appendChild(day);
    }

    updateProgress();
    document.getElementById("streak").innerText = "🔥 Streak: " + streak + " dagen";
}

function checkDayCompletion(dayIndex){
    const dayKey = currentWeek+"-"+dayIndex;

    const allDone = weeks[currentWeek].tasks.every((_,j)=>{
        return state[currentWeek+"-"+dayIndex+"-"+j];
    });

    if(allDone && !completedDays.has(dayKey)){
        streak++;
        completedDays.add(dayKey);
    }
}

function updateProgress(){
    let total=0, done=0;

    Object.keys(state).forEach(k=>{
        total++;
        if(state[k]) done++;
    });

    const perc = total?Math.round(done/total*100):0;
    document.getElementById("progress").innerText="Progress: "+perc+"%";
}

function nextWeek(){
    if(currentWeek < weeks.length-1){
        currentWeek++;
        render();
    }
}

function prevWeek(){
    if(currentWeek > 0){
        currentWeek--;
        render();
    }
}

window.onload = render;
</script>

</body>
</html>
