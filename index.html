<script>
const weeks = [
{phase:"Week 1-2: Mobilisatie", tasks:["Mobiliseren","Zitten/staan","ADL"]},
{phase:"Week 3-4: Kracht", tasks:["Kracht","Balans","Herhaling"]},
{phase:"Week 5-7: Functioneel", tasks:["Traplopen","Lopen","Transfers"]},
{phase:"Week 8-10: Uithoudingsvermogen", tasks:["Wandelen","Fietsen","Activiteit"]},
{phase:"Week 11-12: Participatie", tasks:["Werk","Planning","Sociaal"]}
];

let currentWeek = 0;
let state = {};
let ratings = {};
let streak = 0;
let completedDays = new Set(); // voorkomt dubbele streak gain

function render() {
    document.getElementById("phase").innerText = weeks[currentWeek].phase;

    const cal = document.getElementById("calendar");
    cal.innerHTML = "";

    for(let i=0;i<7;i++){
        const dayKey = currentWeek+"-"+i;
        const day = document.createElement("div");
        day.className = "day";

        let allDone = true;
        let html = `<b>Dag ${i+1}</b>`;

        weeks[currentWeek].tasks.forEach((t,j)=>{
            const key = currentWeek+"-"+i+"-"+j;
            const done = state[key];

            if(!done) allDone = false;

            html += `
            <div class="task ${done?"complete":""}" onclick="toggleTask('${key}', ${i})">
                ${t}
                <div class="rating">
                    Moeite:
                    ${renderEmoji(key,1,"🙂")}
                    ${renderEmoji(key,2,"😐")}
                    ${renderEmoji(key,3,"😓")}
                </div>
            </div>`;
        });

        if(allDone && weeks[currentWeek].tasks.length > 0){
            day.classList.add("complete");
        }

        day.innerHTML = html;
        cal.appendChild(day);
    }

    updateProgress();
    document.getElementById("streak").innerText = "🔥 Streak: " + streak + " dagen";
}

function renderEmoji(key, value, emoji){
    const selected = ratings[key] == value ? "font-weight:bold;" : "opacity:0.5;";
    return `<span style="cursor:pointer; ${selected}" onclick="rate(event,'${key}',${value})">${emoji}</span>`;
}

function toggleTask(key, dayIndex){
    state[key] = !state[key];
    checkDayCompletion(dayIndex);
    render();
}

function rate(e,key,value){
    e.stopPropagation();
    ratings[key] = value;
    render();
}

function checkDayCompletion(dayIndex){
    const dayKey = currentWeek+"-"+dayIndex;

    const allDone = weeks[currentWeek].tasks.every((_,j)=>{
        return state[currentWeek+"-"+dayIndex+"-"+j];
    });

    if(allDone && !completedDays.has(dayKey)){
        streak++;
        completedDays.add(dayKey);
    }
}

function updateProgress(){
    let total=0, done=0;

    Object.keys(state).forEach(k=>{
        total++;
        if(state[k]) done++;
    });

    const perc = total?Math.round(done/total*100):0;
    document.getElementById("progress").innerText="Progress: "+perc+"%";
}

function nextWeek(){
    if(currentWeek < weeks.length-1){
        currentWeek++;
        render();
    }
}

function prevWeek(){
    if(currentWeek > 0){
        currentWeek--;
        render();
    }
}

render();
</script>
